  <text x="20" y="775" font-size="10" fill="#4a7a9b" opacity="0.5">v0.8.0</text>
  <!-- Page title -->
  <text x="196" y="90" font-size="20" fill="#00f5ff" font-weight="bold">Token Usage</text>
  <text x="196" y="112" font-size="12" fill="#4a7a9b">Last 30 days · Peak 118k tokens</text>
  <!-- Line Chart area -->
