  <path d="M260,350 C320,340 380,300 440,280 C500,260 540,220 600,240 C660,260 700,200 760,190 C820,180 860,230 920,210 C980,190 1020,220 1080,200 C1140,180 1170,195 1210,190" fill="none" stroke="#00f5ff" stroke-width="2.5"/>
