  <path d="M260,350 C320,340 380,300 440,280 C500,260 540,220 600,240 C660,260 700,200 760,190 C820,180 860,230 920,210 C980,190 1020,220 1080,200 C1140,180 1170,195 1210,190 L1210,386 L260,386 Z" fill="url(#t-fill)"/>
