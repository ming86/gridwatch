  <line x1="260" y1="186" x2="1210" y2="186" stroke="#1a2a4a" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="260" y1="236" x2="1210" y2="236" stroke="#1a2a4a" stroke-width="0.5" stroke-dasharray="4,4"/>
