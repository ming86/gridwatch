<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <!-- Background -->
  <rect width="1280" height="800" fill="#060a14"/>
  <!-- Titlebar -->
  <rect width="1280" height="44" fill="#0a0e1f"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f57" opacity="0.7"/>
  <circle cx="44" cy="22" r="6" fill="#febc2e" opacity="0.7"/>
  <circle cx="64" cy="22" r="6" fill="#28c840" opacity="0.7"/>
  <text x="640" y="28" font-size="13" fill="#4a7a9b" text-anchor="middle">GridWatch</text>
  <line x1="0" y1="44" x2="1280" y2="44" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar -->
  <rect x="0" y="44" width="160" height="756" fill="#0a0e1f"/>
  <line x1="160" y1="44" x2="160" y2="800" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar nav — Transfer active -->
  <text x="20" y="83" font-size="13" fill="#4a7a9b">Sessions</text>
  <text x="20" y="117" font-size="13" fill="#4a7a9b">Tokens</text>
  <text x="20" y="151" font-size="13" fill="#4a7a9b">Activity</text>
  <text x="20" y="185" font-size="13" fill="#4a7a9b">Insights</text>
  <rect x="0" y="200" width="3" height="28" fill="#ff6600"/>
  <text x="20" y="219" font-size="13" fill="#00f5ff" font-weight="bold">Transfer</text>
  <line x1="12" y1="720" x2="148" y2="720" stroke="#1a2a4a" stroke-width="1"/>
  <text x="20" y="745" font-size="13" fill="#4a7a9b">Settings</text>
  <text x="20" y="775" font-size="10" fill="#4a7a9b" opacity="0.5">v0.8.0</text>
  <!-- Page title -->
  <text x="196" y="90" font-size="20" fill="#00f5ff" font-weight="bold">Transfer</text>
  <text x="196" y="112" font-size="12" fill="#4a7a9b">Generate a context transfer document between sessions</text>
  <!-- Session picker area -->
  <rect x="196" y="130" width="1048" height="120" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Source dropdown -->
  <text x="220" y="162" font-size="11" fill="#4a7a9b">Source Session</text>
  <rect x="220" y="172" width="380" height="40" rx="6" fill="#060a14" stroke="#1a2a4a" stroke-width="1"/>
  <text x="236" y="197" font-size="12" fill="#c0e8ff">Implement auth middleware</text>
  <text x="570" y="197" font-size="12" fill="#4a7a9b">▾</text>
  <!-- Arrow -->
  <text x="660" y="197" font-size="22" fill="#00f5ff" text-anchor="middle">→</text>
  <!-- Target dropdown -->
  <text x="720" y="162" font-size="11" fill="#4a7a9b">Target Session</text>
  <rect x="720" y="172" width="380" height="40" rx="6" fill="#060a14" stroke="#1a2a4a" stroke-width="1"/>
  <text x="736" y="197" font-size="12" fill="#c0e8ff">Fix dashboard layout bugs</text>
  <text x="1070" y="197" font-size="12" fill="#4a7a9b">▾</text>
  <!-- Generate button -->
  <rect x="220" y="222" width="160" height="18" rx="4" fill="#00f5ff" opacity="0.15"/>
  <text x="256" y="235" font-size="10" fill="#00f5ff">Generate Transfer Doc</text>
  <!-- Transfer document preview -->
  <rect x="196" y="270" width="1048" height="500" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="300" font-size="14" fill="#c0e8ff" font-weight="bold">Transfer Document Preview</text>
  <!-- Document content -->
  <text x="220" y="336" font-size="12" fill="#00f5ff" font-weight="bold">## Context Summary</text>
  <text x="220" y="360" font-size="11" fill="#c0e8ff">The source session implemented JWT-based authentication</text>
  <text x="220" y="378" font-size="11" fill="#c0e8ff">middleware for Express routes in the gridwatch project.</text>
  <line x1="220" y1="395" x2="1210" y2="395" stroke="#1a2a4a" stroke-width="0.5"/>
  <text x="220" y="420" font-size="12" fill="#00f5ff" font-weight="bold">## Key Decisions</text>
  <text x="220" y="444" font-size="11" fill="#4a7a9b">•</text>
  <text x="236" y="444" font-size="11" fill="#c0e8ff">Used bcrypt for password hashing (cost factor 12)</text>
  <text x="220" y="466" font-size="11" fill="#4a7a9b">•</text>
  <text x="236" y="466" font-size="11" fill="#c0e8ff">Token refresh endpoint at /api/auth/refresh</text>
  <text x="220" y="488" font-size="11" fill="#4a7a9b">•</text>
  <text x="236" y="488" font-size="11" fill="#c0e8ff">Middleware applied to all /api/* routes except /auth</text>
  <line x1="220" y1="505" x2="1210" y2="505" stroke="#1a2a4a" stroke-width="0.5"/>
  <text x="220" y="530" font-size="12" fill="#00f5ff" font-weight="bold">## Files Modified</text>
  <text x="236" y="554" font-size="11" fill="#0080ff">src/middleware/auth.ts</text>
  <text x="236" y="576" font-size="11" fill="#0080ff">src/routes/api.ts</text>
  <text x="236" y="598" font-size="11" fill="#0080ff">src/utils/jwt.ts</text>
  <line x1="220" y1="615" x2="1210" y2="615" stroke="#1a2a4a" stroke-width="0.5"/>
  <text x="220" y="640" font-size="12" fill="#00f5ff" font-weight="bold">## Open Questions</text>
  <text x="236" y="664" font-size="11" fill="#c0e8ff">Should the dashboard routes require auth as well?</text>
  <!-- Copy button -->
  <rect x="1100" y="286" width="120" height="28" rx="5" fill="#0080ff" opacity="0.15" stroke="#0080ff" stroke-width="1"/>
  <text x="1128" y="305" font-size="11" fill="#0080ff">Copy to Clipboard</text>
  <!-- Outer border -->
  <rect x="0" y="0" width="1280" height="800" rx="8" fill="none" stroke="#1a2a4a" stroke-width="2"/>
</svg>
