<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <linearGradient id="s-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#060a14" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="800" fill="#060a14"/>
  <!-- Titlebar -->
  <rect width="1280" height="44" fill="#0a0e1f"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f57" opacity="0.7"/>
  <circle cx="44" cy="22" r="6" fill="#febc2e" opacity="0.7"/>
  <circle cx="64" cy="22" r="6" fill="#28c840" opacity="0.7"/>
  <text x="640" y="28" font-size="13" fill="#4a7a9b" text-anchor="middle">GridWatch</text>
  <line x1="0" y1="44" x2="1280" y2="44" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar -->
  <rect x="0" y="44" width="160" height="756" fill="#0a0e1f"/>
  <line x1="160" y1="44" x2="160" y2="800" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar nav — Sessions active -->
  <rect x="0" y="64" width="3" height="28" fill="#ff6600"/>
  <text x="20" y="83" font-size="13" fill="#00f5ff" font-weight="bold">Sessions</text>
  <text x="20" y="117" font-size="13" fill="#4a7a9b">Tokens</text>
  <text x="20" y="151" font-size="13" fill="#4a7a9b">Activity</text>
  <text x="20" y="185" font-size="13" fill="#4a7a9b">Insights</text>
  <text x="20" y="219" font-size="13" fill="#4a7a9b">Transfer</text>
  <!-- Sidebar bottom -->
  <line x1="12" y1="720" x2="148" y2="720" stroke="#1a2a4a" stroke-width="1"/>
  <text x="20" y="745" font-size="13" fill="#4a7a9b">Settings</text>
  <text x="20" y="775" font-size="10" fill="#4a7a9b" opacity="0.5">v0.8.0</text>
  <!-- Content area -->
  <rect x="160" y="44" width="1120" height="756" fill="url(#s-glow)"/>
  <!-- Page title -->
  <text x="196" y="90" font-size="20" fill="#00f5ff" font-weight="bold">Sessions</text>
  <text x="196" y="112" font-size="12" fill="#4a7a9b">6 sessions · 3 active</text>
  <!-- Session Card 1 -->
  <rect x="196" y="132" width="1048" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="163" font-size="15" fill="#c0e8ff" font-weight="bold">Implement auth middleware</text>
  <text x="220" y="185" font-size="12" fill="#4a7a9b">faesel/gridwatch</text>
  <text x="420" y="185" font-size="12" fill="#4a7a9b">main</text>
  <rect x="220" y="200" width="60" height="22" rx="4" fill="#0080ff" opacity="0.15"/>
  <text x="232" y="215" font-size="10" fill="#0080ff">12 turns</text>
  <rect x="290" y="200" width="72" height="22" rx="4" fill="#00f5ff" opacity="0.1"/>
  <text x="302" y="215" font-size="10" fill="#00f5ff">84k tokens</text>
  <rect x="372" y="200" width="50" height="22" rx="4" fill="#ff6600" opacity="0.12"/>
  <text x="382" y="215" font-size="10" fill="#ff6600">65%</text>
  <text x="220" y="252" font-size="11" fill="#4a7a9b">Last: "Add JWT validation to the express routes"</text>
  <!-- Session Card 2 -->
  <rect x="196" y="290" width="1048" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="321" font-size="15" fill="#c0e8ff" font-weight="bold">Fix dashboard layout bugs</text>
  <text x="220" y="343" font-size="12" fill="#4a7a9b">faesel/gridwatch</text>
  <text x="420" y="343" font-size="12" fill="#4a7a9b">feature/dashboard</text>
  <rect x="220" y="358" width="52" height="22" rx="4" fill="#0080ff" opacity="0.15"/>
  <text x="232" y="373" font-size="10" fill="#0080ff">8 turns</text>
  <rect x="282" y="358" width="72" height="22" rx="4" fill="#00f5ff" opacity="0.1"/>
  <text x="294" y="373" font-size="10" fill="#00f5ff">52k tokens</text>
  <rect x="364" y="358" width="50" height="22" rx="4" fill="#ff6600" opacity="0.12"/>
  <text x="374" y="373" font-size="10" fill="#ff6600">41%</text>
  <text x="220" y="410" font-size="11" fill="#4a7a9b">Last: "The sidebar overflows on zoom levels above 150%"</text>
  <!-- Session Card 3 -->
  <rect x="196" y="448" width="1048" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="479" font-size="15" fill="#c0e8ff" font-weight="bold">Add token usage charts</text>
  <text x="220" y="501" font-size="12" fill="#4a7a9b">faesel/gridwatch</text>
  <text x="420" y="501" font-size="12" fill="#4a7a9b">feature/tokens</text>
  <rect x="220" y="516" width="60" height="22" rx="4" fill="#0080ff" opacity="0.15"/>
  <text x="232" y="531" font-size="10" fill="#0080ff">22 turns</text>
  <rect x="290" y="516" width="80" height="22" rx="4" fill="#00f5ff" opacity="0.1"/>
  <text x="302" y="531" font-size="10" fill="#00f5ff">118k tokens</text>
  <rect x="380" y="516" width="50" height="22" rx="4" fill="#ff6600" opacity="0.12"/>
  <text x="390" y="531" font-size="10" fill="#ff6600">92%</text>
  <text x="220" y="568" font-size="11" fill="#4a7a9b">Last: "Use Recharts for the line and bar charts"</text>
  <!-- Outer border -->
  <rect x="0" y="0" width="1280" height="800" rx="8" fill="none" stroke="#1a2a4a" stroke-width="2"/>
</svg>
