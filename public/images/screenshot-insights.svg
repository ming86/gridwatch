<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <!-- Background -->
  <rect width="1280" height="800" fill="#060a14"/>
  <!-- Titlebar -->
  <rect width="1280" height="44" fill="#0a0e1f"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f57" opacity="0.7"/>
  <circle cx="44" cy="22" r="6" fill="#febc2e" opacity="0.7"/>
  <circle cx="64" cy="22" r="6" fill="#28c840" opacity="0.7"/>
  <text x="640" y="28" font-size="13" fill="#4a7a9b" text-anchor="middle">GridWatch</text>
  <line x1="0" y1="44" x2="1280" y2="44" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar -->
  <rect x="0" y="44" width="160" height="756" fill="#0a0e1f"/>
  <line x1="160" y1="44" x2="160" y2="800" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar nav — Insights active -->
  <text x="20" y="83" font-size="13" fill="#4a7a9b">Sessions</text>
  <text x="20" y="117" font-size="13" fill="#4a7a9b">Tokens</text>
  <text x="20" y="151" font-size="13" fill="#4a7a9b">Activity</text>
  <rect x="0" y="166" width="3" height="28" fill="#ff6600"/>
  <text x="20" y="185" font-size="13" fill="#00f5ff" font-weight="bold">Insights</text>
  <text x="20" y="219" font-size="13" fill="#4a7a9b">Transfer</text>
  <line x1="12" y1="720" x2="148" y2="720" stroke="#1a2a4a" stroke-width="1"/>
  <text x="20" y="745" font-size="13" fill="#4a7a9b">Settings</text>
  <text x="20" y="775" font-size="10" fill="#4a7a9b" opacity="0.5">v0.8.0</text>
  <!-- Page title -->
  <text x="196" y="90" font-size="20" fill="#00f5ff" font-weight="bold">Insights</text>
  <text x="196" y="112" font-size="12" fill="#4a7a9b">Prompt quality analysis · 6 sessions analysed</text>
  <!-- Score circle panel -->
  <rect x="196" y="130" width="1048" height="250" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="720" y="168" font-size="14" fill="#c0e8ff" font-weight="bold">Overall Prompt Score</text>
  <!-- Large score ring -->
  <circle cx="720" cy="270" r="70" fill="none" stroke="#1a2a4a" stroke-width="8"/>
  <circle cx="720" cy="270" r="70" fill="none" stroke="#00f5ff" stroke-width="8" stroke-dasharray="352" stroke-dashoffset="70" stroke-linecap="round" transform="rotate(-90 720 270)"/>
  <text x="720" y="262" font-size="36" fill="#00f5ff" text-anchor="middle" font-weight="bold">8</text>
  <text x="720" y="288" font-size="16" fill="#4a7a9b" text-anchor="middle">/10</text>
  <!-- Score summary stats -->
  <text x="480" y="230" font-size="11" fill="#4a7a9b" text-anchor="middle">Clarity</text>
  <text x="480" y="255" font-size="20" fill="#00f5ff" text-anchor="middle">9.2</text>
  <text x="480" y="310" font-size="11" fill="#4a7a9b" text-anchor="middle">Specificity</text>
  <text x="480" y="335" font-size="20" fill="#0080ff" text-anchor="middle">7.8</text>
  <text x="960" y="230" font-size="11" fill="#4a7a9b" text-anchor="middle">Context</text>
  <text x="960" y="255" font-size="20" fill="#0080ff" text-anchor="middle">8.1</text>
  <text x="960" y="310" font-size="11" fill="#4a7a9b" text-anchor="middle">Efficiency</text>
  <text x="960" y="335" font-size="20" fill="#00f5ff" text-anchor="middle">7.5</text>
  <!-- Prompt feedback cards -->
  <text x="196" y="415" font-size="14" fill="#c0e8ff" font-weight="bold">Recent Prompt Feedback</text>
  <!-- Card 1 -->
  <rect x="196" y="435" width="340" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="216" y="455" width="40" height="24" rx="4" fill="#00f5ff" opacity="0.15"/>
  <text x="224" y="472" font-size="12" fill="#00f5ff" font-weight="bold">9/10</text>
  <text x="268" y="472" font-size="11" fill="#c0e8ff">"Add JWT validation..."</text>
  <text x="216" y="500" font-size="10" fill="#4a7a9b">Clear scope, specific file paths,</text>
  <text x="216" y="516" font-size="10" fill="#4a7a9b">good context provided.</text>
  <rect x="216" y="535" width="60" height="18" rx="3" fill="#0080ff" opacity="0.12"/>
  <text x="224" y="548" font-size="9" fill="#0080ff">Excellent</text>
  <!-- Card 2 -->
  <rect x="550" y="435" width="340" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="570" y="455" width="40" height="24" rx="4" fill="#0080ff" opacity="0.15"/>
  <text x="578" y="472" font-size="12" fill="#0080ff" font-weight="bold">7/10</text>
  <text x="622" y="472" font-size="11" fill="#c0e8ff">"Fix the sidebar..."</text>
  <text x="570" y="500" font-size="10" fill="#4a7a9b">Good description but could</text>
  <text x="570" y="516" font-size="10" fill="#4a7a9b">be more specific on breakpoints.</text>
  <rect x="570" y="535" width="40" height="18" rx="3" fill="#0080ff" opacity="0.12"/>
  <text x="578" y="548" font-size="9" fill="#0080ff">Good</text>
  <!-- Card 3 -->
  <rect x="904" y="435" width="340" height="140" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="924" y="455" width="40" height="24" rx="4" fill="#ff6600" opacity="0.15"/>
  <text x="932" y="472" font-size="12" fill="#ff6600" font-weight="bold">5/10</text>
  <text x="976" y="472" font-size="11" fill="#c0e8ff">"Make it work..."</text>
  <text x="924" y="500" font-size="10" fill="#4a7a9b">Vague request. Try specifying</text>
  <text x="924" y="516" font-size="10" fill="#4a7a9b">expected behaviour and files.</text>
  <rect x="924" y="535" width="70" height="18" rx="3" fill="#ff6600" opacity="0.12"/>
  <text x="932" y="548" font-size="9" fill="#ff6600">Needs Work</text>
  <!-- Outer border -->
  <rect x="0" y="0" width="1280" height="800" rx="8" fill="none" stroke="#1a2a4a" stroke-width="2"/>
</svg>
