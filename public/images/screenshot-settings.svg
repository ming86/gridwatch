<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <!-- Background -->
  <rect width="1280" height="800" fill="#060a14"/>
  <!-- Titlebar -->
  <rect width="1280" height="44" fill="#0a0e1f"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f57" opacity="0.7"/>
  <circle cx="44" cy="22" r="6" fill="#febc2e" opacity="0.7"/>
  <circle cx="64" cy="22" r="6" fill="#28c840" opacity="0.7"/>
  <text x="640" y="28" font-size="13" fill="#4a7a9b" text-anchor="middle">GridWatch</text>
  <line x1="0" y1="44" x2="1280" y2="44" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar -->
  <rect x="0" y="44" width="160" height="756" fill="#0a0e1f"/>
  <line x1="160" y1="44" x2="160" y2="800" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Sidebar nav — Settings active -->
  <text x="20" y="83" font-size="13" fill="#4a7a9b">Sessions</text>
  <text x="20" y="117" font-size="13" fill="#4a7a9b">Tokens</text>
  <text x="20" y="151" font-size="13" fill="#4a7a9b">Activity</text>
  <text x="20" y="185" font-size="13" fill="#4a7a9b">Insights</text>
  <text x="20" y="219" font-size="13" fill="#4a7a9b">Transfer</text>
  <line x1="12" y1="720" x2="148" y2="720" stroke="#1a2a4a" stroke-width="1"/>
  <rect x="0" y="728" width="3" height="28" fill="#ff6600"/>
  <text x="20" y="745" font-size="13" fill="#00f5ff" font-weight="bold">Settings</text>
  <text x="20" y="775" font-size="10" fill="#4a7a9b" opacity="0.5">v0.8.0</text>
  <!-- Page title -->
  <text x="196" y="90" font-size="20" fill="#00f5ff" font-weight="bold">Settings</text>
  <text x="196" y="112" font-size="12" fill="#4a7a9b">Customise your GridWatch experience</text>
  <!-- Zoom panel -->
  <rect x="196" y="130" width="700" height="130" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="162" font-size="14" fill="#c0e8ff" font-weight="bold">Zoom Level</text>
  <text x="220" y="182" font-size="11" fill="#4a7a9b">Adjust the application zoom factor</text>
  <!-- Slider track -->
  <rect x="220" y="205" width="400" height="4" rx="2" fill="#1a2a4a"/>
  <rect x="220" y="205" width="200" height="4" rx="2" fill="#00f5ff"/>
  <!-- Slider thumb -->
  <circle cx="420" cy="207" r="8" fill="#00f5ff"/>
  <!-- Value -->
  <text x="640" y="212" font-size="13" fill="#c0e8ff">100%</text>
  <!-- Labels -->
  <text x="220" y="238" font-size="10" fill="#4a7a9b">50%</text>
  <text x="600" y="238" font-size="10" fill="#4a7a9b">200%</text>
  <!-- Font size panel -->
  <rect x="196" y="280" width="700" height="130" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="312" font-size="14" fill="#c0e8ff" font-weight="bold">Font Size</text>
  <text x="220" y="332" font-size="11" fill="#4a7a9b">Adjust the base font size for all text</text>
  <!-- Slider track -->
  <rect x="220" y="355" width="400" height="4" rx="2" fill="#1a2a4a"/>
  <rect x="220" y="355" width="180" height="4" rx="2" fill="#0080ff"/>
  <!-- Slider thumb -->
  <circle cx="400" cy="357" r="8" fill="#0080ff"/>
  <!-- Value -->
  <text x="640" y="362" font-size="13" fill="#c0e8ff">14px</text>
  <!-- Labels -->
  <text x="220" y="388" font-size="10" fill="#4a7a9b">10px</text>
  <text x="600" y="388" font-size="10" fill="#4a7a9b">24px</text>
  <!-- Density panel -->
  <rect x="196" y="430" width="700" height="130" rx="8" fill="#0a0e1f" stroke="#1a2a4a" stroke-width="1"/>
  <text x="220" y="462" font-size="14" fill="#c0e8ff" font-weight="bold">Density</text>
  <text x="220" y="482" font-size="11" fill="#4a7a9b">Controls padding and spacing throughout the UI</text>
  <!-- Toggle buttons -->
  <rect x="220" y="500" width="120" height="36" rx="6" fill="#1a2a4a" stroke="#1a2a4a" stroke-width="1"/>
  <text x="256" y="523" font-size="12" fill="#4a7a9b" text-anchor="middle">Compact</text>
  <rect x="350" y="500" width="120" height="36" rx="6" fill="#00f5ff" opacity="0.15" stroke="#00f5ff" stroke-width="1"/>
  <text x="386" y="523" font-size="12" fill="#00f5ff" text-anchor="middle">Default</text>
  <rect x="480" y="500" width="140" height="36" rx="6" fill="#1a2a4a" stroke="#1a2a4a" stroke-width="1"/>
  <text x="524" y="523" font-size="12" fill="#4a7a9b" text-anchor="middle">Comfortable</text>
  <!-- Outer border -->
  <rect x="0" y="0" width="1280" height="800" rx="8" fill="none" stroke="#1a2a4a" stroke-width="2"/>
</svg>
