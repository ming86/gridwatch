<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background transparent -->

  <!-- Outer diamond (rotated square) -->
  <polygon
    points="50,4 96,50 50,96 4,50"
    fill="none"
    stroke="#ff1a3c"
    stroke-width="2.5"
    filter="url(#glow-red)"
  />

  <!-- Inner diamond -->
  <polygon
    points="50,22 78,50 50,78 22,50"
    fill="none"
    stroke="#ff1a3c"
    stroke-width="1.5"
    filter="url(#glow-red)"
    opacity="0.7"
  />

  <!-- Corner tick marks at diamond vertices (outer) — orange accents -->
  <!-- Top -->
  <line x1="50" y1="4" x2="50" y2="14" stroke="#ff7700" stroke-width="2" filter="url(#glow-orange)"/>
  <!-- Right -->
  <line x1="96" y1="50" x2="86" y2="50" stroke="#ff7700" stroke-width="2" filter="url(#glow-orange)"/>
  <!-- Bottom -->
  <line x1="50" y1="96" x2="50" y2="86" stroke="#ff7700" stroke-width="2" filter="url(#glow-orange)"/>
  <!-- Left -->
  <line x1="4" y1="50" x2="14" y2="50" stroke="#ff7700" stroke-width="2" filter="url(#glow-orange)"/>

  <!-- Centre dot -->
  <circle
    cx="50" cy="50" r="5"
    fill="#ff1a3c"
    filter="url(#glow-red)"
  />

  <!-- Four connector lines from centre to inner diamond -->
  <line x1="50" y1="45" x2="50" y2="22" stroke="#ff1a3c" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="50" x2="78" y2="50" stroke="#ff1a3c" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="55" x2="50" y2="78" stroke="#ff1a3c" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="50" x2="22" y2="50" stroke="#ff1a3c" stroke-width="1" opacity="0.4"/>
</svg>
